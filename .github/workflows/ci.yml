name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  scan-demo-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build demo-app image
        run: docker build -t demo-app:ci demo-app/
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: demo-app:ci
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  scan-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build agent image
        run: docker build -t supk8s-agent:ci agent/
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: supk8s-agent:ci
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  lint-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check agent/

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML
        run: |
          for f in k8s/base/*.yaml k8s/argocd/*.yaml; do
            echo "Validating $f..."
            python3 -c "import sys, yaml; list(yaml.safe_load_all(open(sys.argv[1])))" "$f" || exit 1
          done
          echo "All manifests valid"
