apiVersion: v1
kind: ServiceAccount
metadata:
  name: supk8s-agent
  namespace: demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: supk8s-agent
  namespace: demo
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: supk8s-agent
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: supk8s-agent
subjects:
  - kind: ServiceAccount
    name: supk8s-agent
    namespace: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: supk8s-agent
  namespace: demo
  labels:
    app: supk8s-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supk8s-agent
  template:
    metadata:
      labels:
        app: supk8s-agent
    spec:
      serviceAccountName: supk8s-agent
      containers:
        - name: agent
          image: supk8s-agent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-server.monitoring.svc.cluster.local"
            - name: WATCH_NAMESPACE
              value: "demo"
            - name: WATCH_DEPLOYMENT
              value: "demo-app"
            - name: ERROR_THRESHOLD
              value: "0.3"
            - name: CHECK_INTERVAL
              value: "15"
            - name: ROLLBACK_IMAGE
              value: "demo-app:v1"
            - name: OPENROUTER_MODEL
              value: "openai/gpt-oss-120b:free"
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: supk8s-llm
                  key: openrouter-api-key
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
